version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: qhd_zoo
      MYSQL_USER: qhd
      MYSQL_PASSWORD: qhd_pass
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      USE_SQLITE: "false"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DB: qhd_zoo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MOCK_WX_LOGIN: "true"
      JWT_SECRET: change-me-in-docker-demo
      ALLOW_MOCK_LLM: "true"
    depends_on:
      - mysql
      - redis
